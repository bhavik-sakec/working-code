spring.application.name=file-parser-engine

# Server Configuration
server.port=8080
#server.address=0.0.0.0

# ============================================================================
# Timeout Configuration — sized for 1M-line MRX files (~921MB)
# At ~30K lines/sec streaming rate, 1M lines takes ~33 seconds.
# With GC pauses and I/O, we allow 30 minutes as an upper bound.
# ============================================================================
server.tomcat.connection-timeout=1800s
spring.mvc.async.request-timeout=1800000

# Async MVC thread pool — 4 threads for parallel async parse jobs
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# File Upload Configuration - sized for 1 million claims
# one million records x 921 chars/line = ~921 MB raw; 2GB gives comfortable headroom
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
server.tomcat.max-swallow-size=-1

# ============================================================================
# Jackson Streaming ? use streaming output for large JSON responses
# Without this, Spring buffers the entire JSON in memory before sending,
# which doubles memory usage and causes timeout for 40K+ line MRX files.
# ============================================================================
spring.jackson.serialization.flush-after-write-value=true

# ============================================================================
# Tomcat Response Buffer ? increase from 8KB default to 256KB
# Reduces the number of flush/write syscalls for large JSON responses.
# ============================================================================
server.tomcat.max-http-response-header-size=256KB

# Logging Configuration
logging.level.com.mrx.fileparserengine=INFO

# Enable ANSI color output in console
spring.output.ansi.enabled=always

# Colored console log pattern:
# - Timestamp in faint color
# - Log level with highlight colors (ERROR=red, WARN=yellow, INFO=green, DEBUG=blue)
# - Logger name in cyan
# - Message in default color
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p){highlight} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

# =============================================================================
# SECURITY: Spring Actuator Endpoint Configuration
# Only exposes safe endpoints (health, info). All other potentially sensitive
# endpoints like /actuator/env, /actuator/beans, /actuator/configprops are
# disabled to prevent information disclosure attacks.
# =============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never



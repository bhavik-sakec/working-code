spring.application.name=file-parser-engine

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.mrx.fileparserengine=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =============================================================================
# SECURITY: Spring Actuator Endpoint Configuration
# Only exposes safe endpoints (health, info). All other potentially sensitive
# endpoints like /actuator/env, /actuator/beans, /actuator/configprops are
# disabled to prevent information disclosure attacks.
# =============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never



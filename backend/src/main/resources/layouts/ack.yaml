  - {
      code: "EDI3136",
      short: "Reject to client - Client received date missing or invalid",
    }
  - { code: "EDI3121", short: "Reject to client - Member ID Missing" }
  - { code: "EDI3122", short: "Reject to client - Patient Name Missing" }
  - { code: "EDI3123", short: "Reject to client - Patient DOB Missing" }
  - { code: "EDI3124", short: "Reject to client - TIN Missing" }
  - { code: "EDI3132", short: "Reject to client - Diagnosis Code Missing" }
  - {
      code: "EDI3109",
      short: "Reject to client - non-covered Place of Service",
    }
  - { code: "EDI3126", short: "Reject to client - non-Covered Type of Bill" }
  - { code: "EDI3110", short: "Reject to client - non-covered Procedure Code" }
  - {
      code: "EDI3120",
      short: "Reject to client - Line Item Service Unit Count equals zero",
